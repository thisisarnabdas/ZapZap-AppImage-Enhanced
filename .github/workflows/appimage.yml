name: Anylinux-AppImage
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
on:
  schedule:
    - cron: "0 7 * * *"
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  workflow_dispatch: {}

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Compare upstream version
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            -H "Authorization: Bearer $GH_TOKEN" | jq -r '.tag_name')
          LAST=$(gh release view stable --json tagName -q '.tagName' 2>/dev/null || echo "none")
          echo "Upstream: $LATEST | Last built: $LAST"
          [ "$LATEST" != "$LAST" ] && echo "should_build=true" >> "$GITHUB_OUTPUT" \
                                   || echo "should_build=false" >> "$GITHUB_OUTPUT"

  build:
    needs: [check-update]
    if: |
      needs.check-update.outputs.should_build == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    name: "${{ matrix.name }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            name: Build AppImage
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            name: Build AppImage
            arch: aarch64
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af
      - name: Install Dependencies
        run: /bin/sh ./get-dependencies.sh
      - name: Make AppImage
        run: /bin/sh ./make-appimage.sh
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: AppImage-${{ matrix.arch }}
          path: dist

  release:
    if: ${{ github.ref_name == 'main' }}
    needs: [build]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: AppImage-*
          merge-multiple: true
      - name: Release AppImage
        uses: pkgforge-dev/make-stable-appimage-release@4ed3d48ccb065352b6e6c0db6d39885b201c54a0
